[build]
  publish = "frontend"
  functions = "netlify/functions"

[dev]
  publish = "frontend"
  functions = "netlify/functions"
  targetPort = 3000

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200

[[redirects]]
  from = "/driver/*"
  to = "/driver/:splat"
  status = 200

[[redirects]]
  from = "/apply/*"
  to = "/apply/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
